name: smoke
on: [push, pull_request]
jobs:
  smoke:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Clone vivid-core
        run: git clone --depth 1 https://github.com/seethroughlab/vivid.git ../vivid
      - name: Build vivid-core smoke target
        run: |
          cmake -B ../vivid/build -S ../vivid
          cmake --build ../vivid/build --target test_demo_graphs
      - name: Run package graph smoke
        run: ../vivid/build/test_demo_graphs "$GITHUB_WORKSPACE/graphs"
      - name: Build + run package C++ tests
        run: |
          cmake -B build-ci -S . \
            -DVIVID_SRC_DIR="$GITHUB_WORKSPACE/../vivid" \
            -DBUILD_PACKAGE_TESTS=ON
          cmake --build build-ci --target test_package_placeholder
          ctest --test-dir build-ci --output-on-failure
